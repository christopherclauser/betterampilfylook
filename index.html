<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topher's Games | Cyber Gaming Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'cyber-black': '#050505',
              'cyber-dark': '#0D0D0D',
              'cyber-pink': '#FF007F',
              'cyber-cyan': '#00F3FF',
              'cyber-border': '#1A1A1A',
            },
            fontFamily: {
              display: ['Space Grotesk', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;500;700&display=swap');
      
      body {
        background-color: #050505;
        color: #d1d5db;
        font-family: 'Inter', sans-serif;
      }

      .neon-text-cyan {
        text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
      }

      .neon-text-pink {
        text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
      }

      .scanline {
        width: 100%;
        height: 100px;
        z-index: 99;
        background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 243, 255, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
        opacity: 0.1;
        position: fixed;
        bottom: 100%;
        left: 0;
        pointer-events: none;
        animation: scanline 10s linear infinite;
      }

      @keyframes scanline {
        0% { bottom: 100%; }
        100% { bottom: -100px; }
      }

      .neon-border:hover {
        border-color: rgba(0, 243, 255, 0.5);
        box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
      }

      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body class="bg-cyber-black text-white selection:bg-cyber-cyan/30 overflow-x-hidden min-h-screen">
    <div class="scanline"></div>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
